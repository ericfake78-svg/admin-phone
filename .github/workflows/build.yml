name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package

      - name: List target folder (debug)
        run: ls -la target/

      - name: Inspect jar contents (debug)
        run: unzip -l target/mc-admin-plugin.jar

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: mc-admin-plugin
          path: target/mc-admin-plugin.jar
